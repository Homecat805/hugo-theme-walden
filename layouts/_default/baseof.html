<!DOCTYPE html>
<html lang="{{.Site.LanguageCode}}">
   <head>
      <!-- 必须的 meta 标签 -->
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <!-- Title -->
      <title>{{ .Title }}｜{{ .Site.Title }}</title>
      <!-- Favicons -->
      <link href="{{ "favicon.png" | relURL }}" rel="icon">
      <!-- Bootstrap Icons -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
      <!-- Local CSS from SASS-->
      {{ $sass := resources.Get "sass/local.scss" }}
      {{ $style := $sass | resources.ToCSS (dict "targetPath" "css/main.css" ) }}
      <link rel="stylesheet" type="text/css" media="screen" href="{{ $style.Permalink }}">
   </head>
   <body>
      <!-- 页面头部 -->
      <div class="gw-header" >
         {{- partial "baseof/header.html" . -}}
      </div>
      <!-- 舞台顶部 -->
      <div class="gw-stage-top">
         {{- block "stage-top" . }}{{- end }}
      </div>
      <!-- 舞台中心 -->
      <div class="gw-stage-center">
         {{- block "stage-center" . }}{{- end }}
      </div>
      <!-- 页面底部 -->
      <div class="gw-footer">
         {{- partial "baseof/footer.html" . -}}
      </div>
      <!-- Third Party and local Scripts -->
      <script src="{{ "js/jquery-3.6.0.min.js" | relURL }}"></script>
      <script src="{{ "js/local.js" | relURL }}"></script>
   </body>
</html>
